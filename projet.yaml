apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gitops-app
  namespace: default
spec:
  description: GitOps project

  sourceRepos:
    - https://github.com/Dyhia777/argo-cd-project.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
