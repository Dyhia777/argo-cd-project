apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: default
spec:
  project: gitops-app
  source:
    repoURL: https://helm.elastic.co
    chart: charts/elasticsearch
    targetRevision: 8.5.1
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true