apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argo-cd
spec:
  project: gitops
  source:
    repoURL: https://github.com/Dyhia777/argo-cd-project.git
    targetRevision: main
    path: charts/nginx-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true